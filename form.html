<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product Review Form - Submit your product review and share your experience with our products. Help us improve by providing your valuable feedback.">
    <meta name="author" content="Hyeyendele Rashidi">
    <title>Product Review Form</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E%F0%9F%8C%8D%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/getdates.js" defer></script>
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <span id="course-title">WDD 131 – Dynamic Web Fundamentals</span>
        <nav>
            <a href="index.html">Home</a>
            <a href="form.html">Product Review</a>
        </nav>
    </header>

    <main>
        <h1>Product Review Form</h1>
        <p class="form-intro">Share your experience with our products. Your feedback helps us improve!</p>

        <form method="get" action="review.html">
            <!-- Product Name -->
            <div class="form-group">
                <label for="product-name">Product Name <span class="required">*</span></label>
                <select id="product-name" name="product-name" required>
                    <option value="" disabled selected>Select a Product ...</option>
                    <!-- Options will be populated by JavaScript -->
                </select>
            </div>

            <!-- Overall Rating -->
            <div class="form-group">
                <label>Overall Rating <span class="required">*</span></label>
                <div class="rating-group">
                    <div class="rating-option">
                        <input type="radio" id="rating-1" name="rating" value="1" required>
                        <label for="rating-1">☆</label>
                    </div>
                    <div class="rating-option">
                        <input type="radio" id="rating-2" name="rating" value="2" required>
                        <label for="rating-2">☆</label>
                    </div>
                    <div class="rating-option">
                        <input type="radio" id="rating-3" name="rating" value="3" required>
                        <label for="rating-3">☆</label>
                    </div>
                    <div class="rating-option">
                        <input type="radio" id="rating-4" name="rating" value="4" required>
                        <label for="rating-4">☆</label>
                    </div>
                    <div class="rating-option">
                        <input type="radio" id="rating-5" name="rating" value="5" required>
                        <label for="rating-5">☆</label>
                    </div>
                </div>
            </div>

            <!-- Date of Installation -->
            <div class="form-group">
                <label for="installation-date">Date of Installation <span class="required">*</span></label>
                <input type="date" id="installation-date" name="installation-date" required>
            </div>

            <!-- Useful Features -->
            <div class="form-group">
                <label>Useful Features</label>
                <div class="checkbox-group">
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature-easy-setup" name="useful-features" value="Easy Setup">
                        <label for="feature-easy-setup">Easy Setup</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature-durability" name="useful-features" value="Durability">
                        <label for="feature-durability">Durability</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature-performance" name="useful-features" value="Performance">
                        <label for="feature-performance">Performance</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature-design" name="useful-features" value="Design">
                        <label for="feature-design">Design</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature-value" name="useful-features" value="Value for Money">
                        <label for="feature-value">Value for Money</label>
                    </div>
                </div>
            </div>

            <!-- Written Review -->
            <div class="form-group">
                <label for="review">Written Review</label>
                <textarea id="review" name="review" placeholder="Share your thoughts about the product..."></textarea>
            </div>

            <!-- User Name -->
            <div class="form-group">
                <label for="user-name">Your Name</label>
                <input type="text" id="user-name" name="user-name" placeholder="Enter your name (optional)">
            </div>

            <!-- Submit Button -->
            <div class="form-actions">
                <button type="submit">Submit Review</button>
            </div>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> Hyeyendele Rashidi, Uganda</p>
        <p id="lastModified">👨‍🎓</p>
        <p><a href="references.html">References</a></p>
    </footer>
</body>
</html>
